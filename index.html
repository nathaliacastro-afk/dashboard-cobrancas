<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — Cobranças & Atrasos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#1e3a5f;--navy2:#162d4a;--bg:#f0f2f5;--surface:#fff;--border:#e0e4ea;--text:#1a2333;--muted:#6b7a8d;--red:#c0392b;--green:#1e7e4a;--blue:#1a56a0;--orange:#c4521a;--yellow:#b8860b;--purple:#6b3fa0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* HEADER */
.topbar{background:var(--navy);padding:.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.topbar .brand{color:#a8c4e0;font-size:.72rem;font-weight:500;}
.topbar .period{background:rgba(255,255,255,.12);color:#fff;border-radius:20px;padding:.28rem .85rem;font-size:.72rem;font-weight:600;letter-spacing:.02em;}
.header{background:var(--navy);padding:.9rem 1.5rem 1.1rem;display:flex;align-items:center;gap:.75rem;border-top:1px solid rgba(255,255,255,.08);}
.header-icon{width:28px;height:28px;background:rgba(255,255,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.header h1{color:#fff;font-size:1.2rem;font-weight:700;}

/* FILTERS BAR */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;}
.filters label{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
select,input[type=text]{border:1px solid var(--border);border-radius:20px;padding:.3rem .85rem;font-size:.78rem;font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);cursor:pointer;}
select:focus,input:focus{outline:2px solid var(--navy);border-color:var(--navy);}
input[type=text]{width:180px;}

/* MAIN */
.main{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1.25rem;}

/* SECTION TITLE */
.sec-title{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem;}
@media(max-width:800px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;border-top:3px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.kcard.k-tot{border-top-color:var(--navy);background:#f5f3ee;}
.kcard.k-ven{border-top-color:var(--red);background:#fdf0ee;}
.kcard.k-ar{border-top-color:var(--blue);background:#eef3f8;}
.kcard.k-in{border-top-color:var(--orange);background:#fdf2ec;}
.kcard-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem;}
.kcard.k-tot .kcard-label{color:var(--navy);}
.kcard.k-ven .kcard-label{color:var(--red);}
.kcard.k-ar .kcard-label{color:var(--blue);}
.kcard.k-in .kcard-label{color:var(--orange);}
.kcard-val{font-size:1.6rem;font-weight:700;line-height:1;color:var(--text);}
.kcard.k-ven .kcard-val{color:var(--red);}
.kcard.k-ar .kcard-val{color:var(--blue);}
.kcard.k-in .kcard-val{color:var(--orange);}
.kcard-sub{font-size:.68rem;color:var(--muted);margin-top:.35rem;}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
@media(max-width:750px){.two-col{grid-template-columns:1fr;}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.06);}

/* STATUS LIST */
.srow{display:flex;align-items:center;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid var(--border);}
.srow:last-child{border-bottom:none;}
.srow-left{display:flex;align-items:center;gap:.6rem;font-size:.8rem;}
.sbar-wrap{flex:1;margin:0 .75rem;background:var(--bg);border-radius:4px;height:6px;overflow:hidden;}
.sbar-fill{height:6px;border-radius:4px;}
.srow-right{font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap;min-width:80px;text-align:right;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* AGING GRID */
.aging-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;}
.acell{background:var(--bg);border-radius:8px;padding:.8rem 1rem;border-left:3px solid transparent;}
.acell.red{border-left-color:var(--red);background:#fdf3f2;}
.acell.orange{border-left-color:var(--orange);background:#fdf5f0;}
.acell.yellow{border-left-color:var(--yellow);background:#fdfaed;}
.acell.blue{border-left-color:var(--blue);background:#f0f4fd;}
.acell-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem;}
.acell.red .acell-label{color:var(--red);}
.acell.orange .acell-label{color:var(--orange);}
.acell.yellow .acell-label{color:var(--yellow);}
.acell.blue .acell-label{color:var(--blue);}
.acell-val{font-size:1.15rem;font-weight:700;}
.acell.red .acell-val{color:var(--red);}
.acell.orange .acell-val{color:var(--orange);}
.acell.yellow .acell-val{color:var(--yellow);}
.acell.blue .acell-val{color:var(--blue);}
.acell-sub{font-size:.62rem;color:var(--muted);margin-top:.15rem;}

/* TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
thead th{background:var(--navy);color:#fff;padding:.6rem 1rem;text-align:left;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{background:var(--navy2);}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:#f7f9fc;}
tbody td{padding:.5rem 1rem;white-space:nowrap;}
.badge{display:inline-block;padding:.18rem .55rem;border-radius:20px;font-size:.62rem;font-weight:600;}
.bv{background:#fde8e6;color:var(--red);}
.br{background:#e6f4ec;color:var(--green);}
.bn{background:#ede8f5;color:var(--purple);}
.ba{background:#e8eef9;color:var(--blue);}
.ag{font-size:.62rem;padding:.15rem .45rem;border-radius:4px;font-weight:500;}
.a90{background:#fde8e6;color:var(--red);}
.a60{background:#fdeee6;color:var(--orange);}
.a30{background:#fdfaed;color:var(--yellow);}
.a01{background:#e8eef9;color:var(--blue);}
.a0{background:#e6f4ec;color:var(--green);}
.mono{font-family:monospace;font-size:.76rem;}
.muted{color:var(--muted);}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">Dashboard · Cobranças &amp; Atrasos</span>
  <span class="period" id="period"></span>
</div>
<div class="header">
  <div class="header-icon">📋</div>
  <h1>Dashboard de Cobranças e Atrasos</h1>
</div>

<div class="filters">
  <label>Mês:</label>
  <select id="msel"><option value="all">Todos</option></select>
  <label>Status:</label>
  <select id="ssel">
    <option value="all">Todos</option>
    <option value="Vencido">Vencido</option>
    <option value="Recebido">Recebido</option>
    <option value="A Receber">A Receber</option>
    <option value="Renegociado">Renegociado</option>
  </select>
  <label>Busca:</label>
  <input type="text" id="qry" placeholder="Cliente...">
</div>

<div class="main">
  <!-- KPIs -->
  <div>
    <div class="sec-title">Resumo</div>
    <div class="kpi-grid" id="kpis"></div>
  </div>

  <!-- Middle row -->
  <div class="two-col">
    <div class="card">
      <div class="sec-title">Distribuição de Status</div>
      <div id="sdist"></div>
    </div>
    <div class="card">
      <div class="sec-title">Aging de Inadimplência</div>
      <div class="aging-grid" id="ach"></div>
    </div>
  </div>

  <!-- Table -->
  <div>
    <div class="sec-title">Recebido · Vencido · Renegociado por M&#234;s</div>
    <div class="card" style="overflow-x:auto;">
      <div id="chart-wrap"></div>
      <div style="display:flex;gap:1.5rem;margin-top:1rem;padding-left:.5rem;">
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted)"><div style="width:12px;height:12px;border-radius:2px;background:#1e7e4a"></div>Recebido</div>
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted)"><div style="width:12px;height:12px;border-radius:2px;background:#c0392b"></div>Vencido</div>
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted)"><div style="width:12px;height:12px;border-radius:2px;background:#6b3fa0"></div>Renegociado</div>
      </div>
    </div>
  </div>
  <div>
    <div class="sec-title">Detalhamento de Parcelas</div>
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th onclick="srt('cliente')">Cliente ↕</th>
            <th onclick="srt('venc')">Vencimento ↕</th>
            <th onclick="srt('parcela')">Parcela ↕</th>
            <th onclick="srt('pago')">Pago ↕</th>
            <th onclick="srt('status')">Status ↕</th>
            <th>Tipo Receb.</th>
            <th onclick="srt('dias')">Dias Atraso ↕</th>
            <th>Faixa</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

  const W=Math.max(mks.length*(BAR_W*3+GAP+12)+GAP,600);
  let svgBars='',svgLabels='',svgGrid='';
  // grid lines
  [0,.25,.5,.75,1].forEach(p=>{
    const y=Math.round((1-p)*H)+2;
    svgGrid+=`<line x1="60" y1="${y}" x2="${W}" y2="${y}" stroke="#e0e4ea" stroke-width="1"/>`;
    svgGrid+=`<text x="56" y="${y-3}" font-size="9" fill="#9aa" font-family="monospace" text-anchor="end">${p>0?fmt(maxV*p):""}</text>`;
  });
  mks.forEach((k,i)=>{
    const x=GAP+i*(BAR_W*2+GAP+8);
    const rh=Math.max(Math.round(mm[k].r/maxV*H),2);
    const vh=Math.max(Math.round(mm[k].v/maxV*H),2);
    const [y,mo]=k.split('-');
    svgBars+=`<rect x="${x}" y="${H+2-rh}" width="${BAR_W}" height="${rh}" fill="#1e7e4a" rx="3" opacity=".85"><title>Recebido: ${fmt(mm[k].r)}</title></rect>`;
    svgBars+=`<rect x="${x+BAR_W+4}" y="${H+2-vh}" width="${BAR_W}" height="${vh}" fill="#c0392b" rx="3" opacity=".85"><title>Vencido: ${fmt(mm[k].v)}</title></rect>`;
    const nh=Math.max(Math.round(mm[k].n/maxV*H),mm[k].n>0?2:0);
    svgBars+=`<rect x="${x+BAR_W*2+8}" y="${H+2-nh}" width="${BAR_W}" height="${nh}" fill="#6b3fa0" rx="3" opacity=".85"><title>Renegociado: ${fmt(mm[k].n)}</title></rect>`;
    const lx=x+BAR_W+6;
    svgLabels+=`<text x="${lx}" y="${H+LABEL_H-10}" font-size="10" fill="#6b7a8d" text-anchor="middle" font-family="Inter,sans-serif">${['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][+mo-1]+'/'+y.slice(2)}</text>`;
  });
  // Tabela
  let rows=[...data];
  if(sk)rows.sort((a,b)=>{
    let va=a[sk],vb=b[sk];
    if(va==null)va=sa?Infinity:-Infinity;if(vb==null)vb=sa?Infinity:-Infinity;
    if(sk==='venc')return sa?(a.venc>b.venc?1:-1):(a.venc<b.venc?1:-1);
    return sa?(va>vb?1:-1):(va<vb?1:-1);
  });
  document.getElementById('tbody').innerHTML=rows.map(r=>`
    <tr>
      <td>${r.cliente}</td>
      <td class="mono">${fmtD(r.vencD)}</td>
      <td class="mono">${fmt(r.parcela)}</td>
      <td class="mono">${r.pago!=null?fmt(r.pago):'—'}</td>
      <td><span class="badge ${bdC(r.status)}">${r.status}</span></td>
      <td class="muted">${r.tipo||'—'}</td>
      <td class="mono muted">${r.dias!=null?r.dias+'d':'—'}</td>
      <td><span class="ag ${agC(r.faixa)}">${r.faixa||'—'}</span></td>
    </tr>`).join('');

  document.getElementById('chart-wrap').innerHTML=`
    <svg viewBox="0 0 ${W} ${H+LABEL_H+4}" style="width:100%;min-width:${W}px;height:${H+LABEL_H+4}px">
      ${svgGrid}${svgBars}${svgLabels}
    </svg>`;
}
function srt(k){if(sk===k)sa=!sa;else{sk=k;sa=true;}render();}
document.getElementById('msel').addEventListener('change',render);
document.getElementById('ssel').addEventListener('change',render);
document.getElementById('qry').addEventListener('input',render);
render();
</script>
</body>
</html>
